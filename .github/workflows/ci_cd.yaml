  name: "Exemplo pipeline"

  on:
    workflow_dispatch:
    push:
      branches: [main]

  jobs:
    integracao-continua:
      runs-on: ubuntu-latest
      env:
        FLASK_APP: aplicacao.app:APP
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Instala dependencias
          run: pip install -r requirements.txt
        #- name: Migracao
        #  run: |
        #    flask db init
        #    flask db migrate -m "First"
        #    flask db upgrade
        - name: Testes Unitarios
          run: pytest
        - name: Lista dir
          run: ls -la
        - name: Olá, Professor!
          run: echo "Olá, Professor!"
        - name: Sleep
          run: sleep 1
        - name: Olá, Aluno!
          run: echo "Olá, Aluno!"
    entrega-continua:
      needs: integracao-continua
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Login no Docker
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        - name: Configurar QEMU
          uses: docker/setup-qemu-action@v4
        - name: Configurar Buildx
          uses: docker/setup-buildx-action@v4
        - name: Build e Push
          uses: docker/build-and-push@v7
          with:
            context: .
            push: true
            tag: ${{ vars.DOCKER_USERNAME }}/marcus-vinicius-antunes:27-06-26
    estagio02:
      needs: entrega-continua
      runs-on: ubuntu-latest
      steps:
        - name: "Sleep"
          run: sleep 5
    estagio03:
      needs: estagio02
      runs-on: ubuntu-latest
      steps:
        - name: "Sleep"
          run: sleep 2
    